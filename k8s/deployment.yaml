apiVersion: v1
kind: Secret
metadata:
  name: product-service-db-secret
  labels:
    app: product-service
type: Opaque
stringData:
  username: root
  password: root
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: product-service:0.0.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-postgresql.default.svc.cluster.local:5432/product
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: product-service-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-service-db-secret
                  key: password
            - name: SPRING_FLYWAY_URL
              value: jdbc:postgresql://postgres-postgresql.default.svc.cluster.local:5432/product
            - name: SPRING_FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: product-service-db-secret
                  key: username
            - name: SPRING_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-service-db-secret
                  key: password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            httpGet:
              port: 8080
              path: /actuator/health/readiness
          livenessProbe:
            httpGet:
              port: 8080
              path: /actuator/health/liveness
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
    - port: 8080
      targetPort: 8080